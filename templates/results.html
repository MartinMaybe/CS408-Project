<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Results</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- Navigation Bar -->
<nav class="navbar navbar-light bg-light px-4">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">Logo</a>

        <div class="ms-auto">
            <a href="/statistics" class="btn btn-outline-primary">
                Statistics
            </a>
        </div>

    </div>
</nav>

<!-- Main Content -->
<div class="container mt-5" style="max-width:800px;">

    <!-- Session Results -->
    <div class="border border-dark rounded p-4 bg-white mb-4">

        <h4 class="mb-3">Session Results</h4>

        <p class="text-muted mb-1">You completed 6 decisions during this session.</p>
        <p class="text-muted mb-1">Your final path ended at: "Do you enjoy outdoor activities?"</p>
        <p class="text-muted mb-1">This branch currently ends here.</p>

    </div>

    <!-- Create New Question -->
    <div class="border border-dark rounded p-4 bg-white">

        <h4 class="mb-3">Create New Question</h4>

        <p class="text-muted">
            A new question will be created here.
        </p>

    </div>

</div>

<!-- Footer -->
<footer class="bg-light border-top py-3 fixed-bottom text-center">
    <span>Public Decision Tree.</span>
    <span id="datetime">{{.Time}}</span>
</footer>

</body>
</html>
