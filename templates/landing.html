<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Public Decision Tree</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<!-- Navigation Bar -->
<nav class="navbar navbar-light bg-light px-4">
    <div class="container-fluid">

        <a class="navbar-brand" href="/">Logo</a>

        <div class="ms-auto">
            <a href="/statistics" class="btn btn-outline-primary">
                Statistics
            </a>
        </div>

    </div>
</nav>

<!-- Center page content -->
<div class="d-flex align-items-center justify-content-center" style="height: 80vh;">
    <div class="container text-center">

        <h1 class="display-4">Welcome to the Public Decision Tree</h1>

        <p class="lead mt-3">
            A growing collection of user generated cards, each leading to the next.
            Answer questions. When the branch ends, add your own.
        </p>

        <div>
            <a href="/hello" class="btn btn-primary btn-lg mt-4"> 
                Begin
            </a>

            <a href="/hello" class="btn btn-secondary btn-lg mt-4 ms-3"> 
                Resume
            </a>
        </div>

    </div>
</div>

<!-- Footer -->
<footer class="bg-light border-top py-3 fixed-bottom text-center">
    <span>Public Decision Tree.</span>

    <span id="datetime"> {{.Time}} </span> 

</footer>

</body>
</html>
