<!DOCTYPE html>
<html lang="en">
{{template "header" .}}

<div class="d-flex align-items-center justify-content-center" style="height: 80vh;">
    <div class="container text-center">
        <h1 class="display-4">Welcome to the Public Decision Tree</h1>

        <p class="lead mt-3">
            A growing collection of user generated cards, each leading to the next.
            Answer questions. When the branch ends, add your own.
        </p>

        <div>
            <a href="/session?new=1" class="btn btn-primary btn-lg mt-4">
                Begin
            </a>

            <a href="/session" class="btn btn-secondary btn-lg mt-4 ms-3">
                Resume
            </a>
        </div>
    </div>
</div>

{{template "footer" .}}
